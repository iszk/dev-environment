services:
  kanban:
    container_name: vibe-kanban
    hostname: vibe-kanban
    build:
      context: ./
      dockerfile: Dockerfile
      args:
        - UID=${HOST_UID:-1000}
        - GID=${HOST_GID:-1000}
        - DOCKER_GID=${HOST_DOCKER_GID:-999}
    env_file:
      - path: ./.env
        required: false
    working_dir: /workspace
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/ghq/:/workspace
      - ./bin:/workspace/bin
      - dot-vibe-kanban:/home/vk/.vibe-kanban
      - dot-local-share-vibe-kanban:/home/vk/.local/share/vibe-kanban
      - /var/tmp/vibe-kanban/worktrees:/var/tmp/vibe-kanban/worktrees
    environment:
      - GIT_COMMITTER_NAME=iszk
      - GIT_COMMITTER_EMAIL=y@nemui.jp
      - GIT_AUTHOR_NAME=coding agent
      - GIT_AUTHOR_EMAIL=y@nemui.jp
    init: true
    ports:
      - "1080:8080"
    # entrypoint: [ "sleep", "infinity" ]

volumes:
  dot-vibe-kanban:
  dot-local-share-vibe-kanban:
